<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student exam Perforamnce indicator</h1>

    <form action="{{url_for('predict_datapoint')}}" method="post">
        <h1>
            <legend>Student Exam Performace Prediction</legend>
        </h1>
        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-control" name="gender" placeholder="Enter your Gender" required>
                <option selected disabled value="" class="palceholder">Select your Gender</option>
                <option value="male">Male</option>
                <option value="female">female</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">
                Race or Ethnicity
            </label>
            <select name="race_ethnicity" class="form-control" placeholder="Enter your Ethnicity">
                <option class="placeholder" selected disabled value="">Select Ethnicity</option>
                <option value="group A"> Group A</option>
                <option value="group B"> Group B</option>
                <option value="group C"> Group C</option>
                <option value="group D"> Group D</option>
                <option value="group E"> Group E</option>
                
            </select>
        </div>

         <div class="mb-3">
            <label class="form-label">Parental level of Education</label>
            <select class="form-control" name="parental_level_of_education" placeholder="Enter your parents Education" required>
                <option selected disabled value="" class="palceholder">Select parents education</option>
                <option value="associate's degree"> associate's degree</option>
                <option value="bachelor's degree"> bachelor's degree</option>
                <option value="high school"> high school</option>
                <option value="master's degree"> master's degree</option>
                <option value="some college"> some college</option>
                <option value="some high school"> some high school</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Lunch Type</label>
            <select class="form-control" name="lunch" placeholder="Enter your Lunch Type" required>
                <option selected disabled value="" class="palceholder">Select your Lunch Type</option>
                <option value="free/reduced">free/reduced</option>
                <option value="standard">standard</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Test preperation Course</label>
            <select class="form-control" name="test_preparation_course" placeholder="Enter your Course" required>
                <option selected disabled value="" class="palceholder">Select your test course</option>
                <option value="none">none</option>
                <option value="completed">completed</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Writing Score out of 100</label>
            <input class="form-control" type = "number" name="writing_score" placeholder="Enter your Writing Score" min="0" max="100">
              
        </div>
         <div class="mb-3">
            <label class="form-label">Reading Score out of 100</label>
            <input class="form-control" type = "number" name="reading_score" placeholder="Enter your Reading Score" min="0" max="100">
              
        </div>
         <div class="mb-3">
            <input class="btn btn-primary" type = "submit" value="Predict your Maths Score" required>
              
        </div>
    </form>
    <h1>The Prediction is  {{results}}</h1>
</body>
</html>
